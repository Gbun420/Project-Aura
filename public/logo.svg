<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="auraGradient" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#9B72CB" />
      <stop offset="100%" stop-color="#22D3EE" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="20" fill="#0B0D11" />

  <!-- Outer Hexagon - Tech Frame -->
  <path
    d="M50 5 L88.97 27.5 V72.5 L50 95 L11.03 72.5 V27.5 Z"
    stroke="url(#auraGradient)"
    stroke-width="2"
    fill="none"
    opacity="0.6"
  />

  <!-- Inner Orbit - Compliance Ring -->
  <circle
    cx="50"
    cy="50"
    r="30"
    stroke="#4F46E5"
    stroke-width="1.5"
    stroke-dasharray="4 4"
    opacity="0.5"
  />

  <!-- Core - Neural Hub -->
  <circle cx="50" cy="50" r="16" fill="url(#auraGradient)" filter="url(#glow)" />
  
  <!-- Central Node Dot -->
  <circle cx="50" cy="50" r="6" fill="#fff" opacity="0.9" />
</svg>
