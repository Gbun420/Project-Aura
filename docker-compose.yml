# PROJECT AURA: STAGING DEPLOYMENT MANIFEST
version: '3.8'

services:
  aura-os-core:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: aura_backend_staging
    ports:
      - "5000:5000" # REST API & Socket.io
    environment:
      - NODE_ENV=staging
    env_file:
      - ./server/.env.staging
    volumes:
      - sovereign-ledger-data:/usr/src/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  aura-os-glass:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: aura_frontend_staging
    ports:
      - "80:80" # Nginx serving the React static build
    depends_on:
      - aura-os-core
    restart: unless-stopped

volumes:
  sovereign-ledger-data:
    name: aura_sqlite_vault
